<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Game Bentar Yuk! 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 10;
            transition: all 0.5s ease;
        }
        h1 { color: #ff477e; margin-bottom: 15px; font-size: 24px; }
        p { color: #6c757d; font-size: 16px; margin-bottom: 20px; line-height: 1.5; }
        
        /* Gaya Game */
        #gameArea {
            width: 100%;
            height: 200px;
            background-color: #fff0f3;
            border: 2px dashed #ffb3c1;
            border-radius: 15px;
            position: relative;
            margin-bottom: 15px;
            overflow: hidden;
            display: none;
        }
        .target-heart {
            position: absolute;
            font-size: 30px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }
        .score-board {
            font-weight: bold;
            color: #ff477e;
            margin-bottom: 10px;
            display: none;
        }

        /* Tombol */
        .btn {
            background-color: #ff477e;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 71, 126, 0.3);
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            display: none;
        }
        #btnNo { background-color: #6c757d; box-shadow: none; position: relative; }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <div id="iconHeader" style="font-size: 50px;">🎮</div>
        <h1 id="title">Ada Game Buat Kamu!</h1>
        <p id="desc">Mainin game mini ini sebentar ya sampai dapet 5 poin, ada sesuatu yang mau aku tunjukin di akhir. Klik tombol di bawah buat mulai!</p>
        
        <div class="score-board" id="scoreBoard">Poin Kamu: <span id="score">0</span> / 5</div>
        <div id="gameArea"></div>

        <button class="btn" id="btnAction" onclick="mulaiGame()">Mulai Main</button>
        
        <div class="btn-container" id="finalButtons">
            <button class="btn" onclick="terima()">Mau! 🥰</button>
            <button class="btn" id="btnNo" onmouseover="kabur()" onclick="kabur()">Nggak 😜</button>
        </div>
    </div>

    <script>
        let score = 0;
