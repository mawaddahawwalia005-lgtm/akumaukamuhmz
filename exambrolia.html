<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT EXAMBRO - CLIENT V.2026</title>
    <style>
        :root {
            --primary-color: #0d47a1;
            --secondary-color: #1565c0;
            --accent-color: #ffb300;
            --dark-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none; /* Mencegah seleksi teks manual standar browser */
        }

        body {
            background-color: #f1f5f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER ALAM EXAMBRO */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--accent-color);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            background-color: #2e7d32;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        /* MAIN CONTAINER */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* AREA SOAL */
        .exam-area {
            flex: 3;
            padding: 30px;
            overflow-y: auto;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .soal-box {
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 20px;
            background-color: #f8fafc;
            margin-bottom: 20px;
        }

        .soal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .btn-salin {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-salin:hover {
            background-color: var(--primary-color);
        }

        .soal-teks {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #334155;
            margin-bottom: 20px;
        }

        .pilihan-jawaban {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opsi {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .opsi:hover {
            background-color: #f1f5f9;
        }

        .opsi input {
            margin-right: 12px;
            transform: scale(1.2);
        }

        /* NAVIGATION BUTTONS */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn-nav {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-prev { background-color: #64748b; color: white; }
        .btn-next { background-color: var(--secondary-color); color: white; }
        .btn-ragu { background-color: var(--accent-color); color: #000; }

        /* SIDEBAR NOMOR SOAL */
        .sidebar {
            flex: 1;
            background-color: #e2e8f0;
            border-left: 2px solid #cbd5e1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 320px;
        }

        .info-peserta {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid var(--primary-color);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .grid-nomor {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .no-box {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 10px 0;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .no-box.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* POPUP LOCK SCREEN (ANTI CHEAT) */
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(15, 23, 42, 0.98);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }

        .lock-box {
            background: #cbd5e1;
            color: black;
            padding: 30px;
            border-radius: 12px;
            border-top: 8px solid #dc2626;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }

        .lock-box h2 { color: #dc2626; margin-bottom: 10px; }
        .lock-box p { margin-bottom: 20px; font-weight: 500; }

        .btn-unlock {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>

        <div class="header-title">
            <span>💻 CBT EXAMBRO v2026.1</span>
            <span class="status-badge">TERKUNCI / SECURE</span>
        </div>
        <div id="timer">Sisa Waktu: 01:29:55</div>
    </header>

    <div class="main-container">
        
        <main class="exam-area">
            <div class="soal-box">
                <div class="soal-header">
